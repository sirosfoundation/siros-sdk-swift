# SwiftLint Configuration for SIROS SDK

disabled_rules:
  - trailing_whitespace
  - line_length
  - trailing_comma

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - fatal_error_message
  - overridden_super_call
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - unowned_variable_capture

excluded:
  - .build
  - Package.swift
  - Tests/

force_cast: warning
force_try: warning

type_body_length:
  warning: 500
  error: 1200

file_length:
  warning: 700
  error: 1500

function_body_length:
  warning: 60
  error: 120

identifier_name:
  min_length: 1
  allowed_symbols:
    - _
  excluded:
    - id
    - iv
    - ks
