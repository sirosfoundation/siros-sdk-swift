name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-sdk:
    name: Build SDK
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Configure vendor package access
        run: |
          git config --global url."https://x-access-token:${{ secrets.VENDOR_PACKAGES_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Build SDK (macOS + iOS)
        run: |
          swift build -c release

      - name: Run tests
        run: swift test

      - name: Collect SDK artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release-artifacts
          # Package source for SPM consumers (Package.swift + Sources/)
          tar czf "release-artifacts/siros-sdk-swift-${VERSION}-source.tar.gz" \
            Package.swift Sources/ README.md LICENSE
          # SPM build products (if available)
          if [ -d ".build/release" ]; then
            tar czf "release-artifacts/siros-sdk-swift-${VERSION}-build.tar.gz" \
              -C .build/release . 2>/dev/null || true
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: sdk-artifacts
          path: release-artifacts/

  build-sample-app:
    name: Build Sample App
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Configure vendor package access
        run: |
          git config --global url."https://x-access-token:${{ secrets.VENDOR_PACKAGES_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: SampleApp
        run: xcodegen generate

      - name: Build Sample App (iOS Simulator)
        working-directory: SampleApp
        run: |
          xcodebuild build \
            -project SirosSampleApp.xcodeproj \
            -scheme SirosSampleApp \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -20

      - name: Collect sample app artifacts
        run: |
          mkdir -p release-artifacts
          # Find the .app in DerivedData build output
          APP_PATH=$(find SampleApp/build -name "*.app" -path "*Debug*" | head -1)
          if [ -n "$APP_PATH" ]; then
            zip -r "release-artifacts/SirosSampleApp-${{ github.ref_name }}.zip" "$APP_PATH"
          else
            echo "Warning: No .app found in build output"
            find SampleApp/build -name "*.app" 2>/dev/null || echo "No .app files at all"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: sample-app-artifacts
          path: release-artifacts/

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-sdk, build-sample-app]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
