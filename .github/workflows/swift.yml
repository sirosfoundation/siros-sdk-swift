name: Swift CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build & Test
        run: swift test --parallel

  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build for iOS Simulator
        run: |
          swift build \
            --sdk "$(xcrun --sdk iphonesimulator --show-sdk-path)" \
            --triple arm64-apple-ios16.0-simulator

  test-linux:
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Build & Test
        run: swift test --parallel
