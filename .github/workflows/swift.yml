name: Swift CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

jobs:
  test-macos:
    name: Test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Build & Test with Coverage
        run: swift test --parallel --enable-code-coverage
      - name: Check coverage gate
        env:
          COVERAGE_MIN_PCT: "25"
        run: |
          # Use swift test's built-in coverage JSON output
          CODECOV_PATH=$(swift test --show-codecov-path 2>/dev/null || true)
          if [ -z "$CODECOV_PATH" ] || [ ! -f "$CODECOV_PATH" ]; then
            echo "Warning: could not find codecov JSON, skipping coverage gate"
            exit 0
          fi
          # Extract line coverage percentage from the totals
          PCT=$(python3 -c "import json; d=json.load(open('$CODECOV_PATH')); print(f\"{d['data'][0]['totals']['lines']['percent']:.1f}\")")
          echo "Line coverage: ${PCT}%"
          echo "Required minimum: ${COVERAGE_MIN_PCT}%"
          if (( $(echo "$PCT < $COVERAGE_MIN_PCT" | bc -l) )); then
            echo "::error::Coverage gate failed: ${PCT}% < ${COVERAGE_MIN_PCT}%"
            exit 1
          fi
      - name: Convert coverage to lcov
        if: always()
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          PROFDATA=$(find "$BIN_PATH" -name 'default.profdata' -type f | head -1)
          XCTEST=$(find "$BIN_PATH" -name '*.xctest' -type d | head -1)/Contents/MacOS/*
          if [ -n "$PROFDATA" ]; then
            xcrun llvm-cov export -format=lcov -instr-profile "$PROFDATA" $XCTEST \
              -ignore-filename-regex='\.build/|Tests/' > coverage.lcov
          fi
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          flags: macos
          fail_ci_if_error: false

  build-ios:
    name: Build (iOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Build for iOS Simulator
        run: |
          swift build \
            --sdk "$(xcrun --sdk iphonesimulator --show-sdk-path)" \
            --triple arm64-apple-ios16.0-simulator

  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v6
      - name: Build & Test
        run: swift test --parallel

  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint lint

  docs:
    name: Documentation
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Build DocC documentation
        run: |
          for target in SirosWallet SirosTransport SirosAuth SirosKeystore SirosFlow SirosCredentials; do
            echo "Building docs for $target..."
            swift package generate-documentation --target "$target"
          done
