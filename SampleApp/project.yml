name: SirosSampleApp
options:
  bundleIdPrefix: org.sirosfoundation.sdk
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

packages:
  SirosSDK:
    path: ../

targets:
  SirosSampleApp:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    dependencies:
      - package: SirosSDK
        product: SirosWallet
      - package: SirosSDK
        product: SirosCredentials
      - package: SirosSDK
        product: SirosAuth
      - package: SirosSDK
        product: SirosKeystore
    settings:
      base:
        SWIFT_VERSION: "5.10"
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.sirosfoundation.sdk.sample
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: SIROS Sample
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - siros-sample
              - openid-credential-offer
              - openid4vp
        NSCameraUsageDescription: "Camera is used to scan QR codes for credential offers and presentation requests."
